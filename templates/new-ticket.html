{% extends "base.html" %}

{% block title %}New Ticket{% endblock %}

{% block content %}

<form method="POST">


    <label>Priority</label>
    <div class="priority-group">
        <button type="button" class="priority-btn low" onclick="selectPriority(this)">Low</button>
        <button type="button" class="priority-btn medium" onclick="selectPriority(this)">Medium</button>
        <button type="button" class="priority-btn high" onclick="selectPriority(this)">High</button>
    </div>
    <input type="hidden" id="priority" name="priority" value="Low">

    <label for="title">Title</label>
    <input type="text" id="title" name="title">

    <label for="description">Description</label>
    <textarea id="description" name="description"></textarea>

    <label for="status">Status</label>
    <select id="status" name="status">
        <option>Opened</option>
        <option>Active</option>
        <option>Closed</option>
    </select>

    <button type="submit">Create Ticket</button>
</form>

 <script>
     function selectPriority(btn) {
         document.querySelectorAll('.priority-btn').forEach(b => b.classList.remove('active'));
         btn.classList.add('active');
         document.getElementById('priority').value = btn.textContent;
        }
 </script>

{% endblock %}
